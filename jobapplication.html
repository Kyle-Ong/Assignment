<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- Responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Ethical Edge | Job Application</title>

 <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
  <!-- CSS files -->
  <link rel="stylesheet" href="navbar.css">
  <link rel="stylesheet" href="jobapplication.css">
</head>

<body>

  <!-- ===== HEADER / NAV BAR ===== -->
  <input type="checkbox" id="menu-toggle">

  <header>
    <label for="menu-toggle" class="menu-icon">☰</label>

    <div class="brand">
      <a href="Homepg.html"><img src="Image/Logo.JPG" alt="Logo" title="Home_page"></a>

      <div class="brand-text">
        <h1>ETHICAL <span>EDGE</span></h1>
        <p>Integrity. Impact. Excellence.</p>
      </div>
    </div>
  </header>

  <!-- ===== SIDE MENU ===== -->
  <nav class="side-menu">
    <label for="menu-toggle" class="close-btn">✕</label>

    
    <div class="menu-links">
      <a href="Homepg.html">Home Page</a>
      <a href="jobapplication.html">Job Application</a>
      <a href="jobs.html">Job Description</a>
      <a href="About.html">About</a>
    </div>

    <div class="menu-footer">
      <img src="Image/Logo.JPG" alt="Ethical Edge Logo">
      <h2>ETHICAL <span>EDGE</span></h2>
    </div>
  </nav>

  <label for="menu-toggle" class="overlay"></label>

  <!-- ===== MAIN CONTENT ===== -->
  <main>
    <section>
      <h2>Job Application Form</h2>

      <form>

        <!-- Job Reference Number -->
        <label for="jobRef">Job Reference Number</label>
        <select id="jobRef" name="jobRef" required>
          <option value="">Select Job Reference</option>
          <option value="FE101">Frontend Developer (FE101)</option>
          <option value="FE104">UI Developer (FE104)</option>
          <option value="UX102">UI/UX Designer (UX102)</option>
          <option value="UX103">Product Designer (UX103)</option>
          <option value="IT105">IT Support Specialist (IT105)</option>
        </select>

        <!-- First Name -->
        <label for="fname">First Name</label>
        <input type="text" id="fname" name="fname" maxlength="20" required>

        <!-- Last Name -->
        <label for="lname">Last Name</label>
        <input type="text" id="lname" name="lname" maxlength="20" required>

        <!-- Date of Birth -->
        <label for="dob">Date of Birth</label>
        <input type="text"
               id="dob"
               name="dob"
               placeholder="dd/mm/yyyy"
               pattern="\d{2}/\d{2}/\d{4}"
               title="Format: dd/mm/yyyy. Applicants must be 18 years or older."
               required>

        <!-- Gender -->
        <fieldset>
          <legend>Gender</legend>
          <label><input type="radio" name="gender" required> Male</label>
          <label><input type="radio" name="gender"> Female</label>
          <label><input type="radio" name="gender"> Other</label>
        </fieldset>

        <!-- Address -->
        <label for="street">Street Address</label>
        <input type="text" id="street" maxlength="40" required>

        <label for="suburb">Suburb/Town</label>
        <input type="text" id="suburb" maxlength="40" required>

        <!-- ✅ Malaysian State -->
        <label for="state">State</label>
        <select id="state" name="state" required>
          <option value="">Select State</option>
          <option>Johor</option>
          <option>Kedah</option>
          <option>Kelantan</option>
          <option>Melaka</option>
          <option>Negeri Sembilan</option>
          <option>Pahang</option>
          <option>Penang</option>
          <option>Perak</option>
          <option>Perlis</option>
          <option>Sabah</option>
          <option>Sarawak</option>
          <option>Selangor</option>
          <option>Terengganu</option>
          <option>Kuala Lumpur</option>
          <option>Putrajaya</option>
          <option>Labuan</option>
        </select>

        <!-- ✅ Malaysian Postcode -->
        <label for="postcode">Postcode</label>
        <input type="text"
               id="postcode"
               name="postcode"
               pattern="\d{5}"
               title="Malaysian postcode must be exactly 5 digits"
               required>

        <!-- Email -->
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>

        <!-- Phone -->
        <label for="phone">Phone Number</label>
        <input type="tel"
               id="phone"
               name="phone"
               pattern="\d{8,12}"
               title="8 to 12 digits"
               required>

        <!-- Skills -->
        <fieldset>
          <legend>Skill List</legend>
          <label><input type="checkbox" required> HTML</label>
          <label><input type="checkbox"> CSS</label>
          <label><input type="checkbox"> JavaScript</label>
          <label><input type="checkbox"> Other skills…</label>
        </fieldset>

        <!-- Other Skills (REQUIRED) -->
        <label for="otherskills">Other skills</label>
        <textarea id="otherskills" name="otherskills" rows="4" required></textarea>

        <button type="submit">Apply Now</button>

      </form>
    </section>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer>
    <p>&copy; 2026 Ethical Edge. All rights reserved.</p>
  </footer>

</body>
</html>
